<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer Pedido - GELATOFLOW</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="contenedor">

    <h1>Hacer Pedido de Helados</h1>

    <p>Complete el formulario para realizar su pedido</p>

    <form>
        <label>Nombre:</label>
        <input type="text" name="nombre" required>

        <label>Correo:</label>
        <input type="email" name="correo" required>

        <label>Telefono:</label>
        <input type="tel" name="telefono" required>

        <label>Sabor preferido:</label>
        <select name="sabor" required>
            <option>Vainilla</option>
            <option>Chocolate</option>
            <option>Fresa</option>
            <option>Pistacho</option>
            <option>Menta</option>
        </select>

        <label>Cantidad (litros):</label>
        <input type="number" name="cantidad" min="0.5" step="0.5" required>

        <label>Fecha de entrega:</label>
        <input type="date" name="fecha_entrega" required>

        <label>Direccion de entrega:</label>
        <textarea name="direccion" rows="3" required></textarea>

        <input type="submit" value="Confirmar Pedido">
    </form>

    <a href="index.html" class="boton-regresar">Regresar al Inicio</a>

</div>

</body>
</html>
