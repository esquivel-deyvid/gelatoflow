<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GELATOFLOW</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/tema.js" defer></script>
</head>

<body class="auth-body">
<button type="button" class="tema-boton" id="botonTema" aria-label="Cambiar modo nocturno" aria-pressed="false">&#9790;</button>

<div class="auth-contenedor">
    <div class="auth-marca">
        <img src="img/LOGO.png?v=2" alt="Logo GELATOFLOW" class="auth-logo">
        <h1>GELATOFLOW</h1>
        <p>Inicia sesion para entrar al sistema o crea una cuenta si aun no tienes usuario.</p>
    </div>

    <div class="auth-panel">
        <div class="auth-tabs">
            <button type="button" class="auth-tab activo" id="tabLogin">Iniciar sesion</button>
            <button type="button" class="auth-tab" id="tabRegistro">Crear cuenta</button>
        </div>

        <form id="formLogin" class="auth-form activo">
            <h2>Iniciar sesion</h2>
            <label for="correoLogin">Correo:</label>
            <input type="email" name="correo" id="correoLogin" placeholder="correo@ejemplo.com" required>

            <label for="passwordLogin">Contrasena:</label>
            <input type="password" name="password" id="passwordLogin" placeholder="Ingresa tu contrasena" required>

            <input type="submit" value="Entrar">
            <p class="auth-mensaje" id="mensajeLogin"></p>
        </form>

        <form id="formRegistro" class="auth-form">
            <h2>Crear cuenta</h2>
            <label for="nombreRegistro">Nombre completo:</label>
            <input type="text" name="nombre" id="nombreRegistro" placeholder="Tu nombre" required>

            <label for="correoRegistro">Correo:</label>
            <input type="email" name="correo" id="correoRegistro" placeholder="correo@ejemplo.com" required>

            <label for="passwordRegistro">Contrasena:</label>
            <input type="password" name="password" id="passwordRegistro" placeholder="Minimo 4 caracteres" minlength="4" required>

            <label for="confirmarPassword">Confirmar contrasena:</label>
            <input type="password" id="confirmarPassword" placeholder="Repite tu contrasena" minlength="4" required>

            <input type="submit" value="Registrarme">
            <p class="auth-mensaje" id="mensajeRegistro"></p>
        </form>
    </div>
</div>

<script>
    const tabLogin = document.getElementById('tabLogin');
    const tabRegistro = document.getElementById('tabRegistro');
    const formLogin = document.getElementById('formLogin');
    const formRegistro = document.getElementById('formRegistro');
    const mensajeLogin = document.getElementById('mensajeLogin');
    const mensajeRegistro = document.getElementById('mensajeRegistro');

    function mostrarFormulario(tipo) {
        const esLogin = tipo === 'login';
        tabLogin.classList.toggle('activo', esLogin);
        tabRegistro.classList.toggle('activo', !esLogin);
        formLogin.classList.toggle('activo', esLogin);
        formRegistro.classList.toggle('activo', !esLogin);
    }

    tabLogin.addEventListener('click', () => mostrarFormulario('login'));
    tabRegistro.addEventListener('click', () => mostrarFormulario('registro'));

    formLogin.addEventListener('submit', async (e) => {
        try {
            e.preventDefault();
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    correo: document.getElementById('correoLogin').value,
                    password: document.getElementById('passwordLogin').value
                })
            });
            const data = await response.json();

            if (data.success) {
                localStorage.setItem('gelatoflowSesionActiva', 'true');
                localStorage.setItem('gelatoflowUsuarioActual', data.email);
                localStorage.setItem('gelatoflowRolUsuario', data.role || 'cliente');
                window.location.href = 'index.html';
                return;
            }

            mensajeLogin.textContent = data.message;
        } catch (error) {
            mensajeLogin.textContent = 'No se pudo iniciar sesion.';
        }
    });

    formRegistro.addEventListener('submit', async (e) => {
        try {
            e.preventDefault();

            if (document.getElementById('passwordRegistro').value !== document.getElementById('confirmarPassword').value) {
                mensajeRegistro.textContent = 'Las contrasenas no coinciden.';
                return;
            }

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: document.getElementById('nombreRegistro').value,
                    correo: document.getElementById('correoRegistro').value,
                    password: document.getElementById('passwordRegistro').value
                })
            });
            const data = await response.json();

            if (data.success) {
                mensajeRegistro.textContent = 'Cuenta creada, ahora inicia sesion.';
                mostrarFormulario('login');
                return;
            }

            mensajeRegistro.textContent = data.message || 'Error al registrar.';
        } catch (error) {
            mensajeRegistro.textContent = 'No se pudo registrar la cuenta.';
        }
    });
</script>

</body>
</html>
